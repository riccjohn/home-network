networks:
  proxy:
    driver: bridge
    name: proxy

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    hostname: pihole
    domainname: ${DOMAIN:-woggles.work}
    network_mode: host
    environment:
      TZ: ${TZ:-America/New_York}
      FTLCONF_webserver_api_password: ${PIHOLE_PASSWORD:-changeme}
      WEBPASSWORD: ${PIHOLE_PASSWORD:-changeme}
      # Move web UI off port 80/443 so Traefik can own those ports
      FTLCONF_webserver_port: "8080"
      PIHOLE_DNS: ${PIHOLE_DNS:-8.8.8.8;1.1.1.1}
      SERVERIP: ${SERVER_IP:-192.168.0.243}
      INTERFACE: eth0
      IPv6: "false"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    volumes:
      - ./pihole/etc:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
    cap_add:
      - NET_ADMIN

  traefik:
    container_name: traefik
    image: traefik:v3
    # Pass ACME email from .env (traefik.yml does not support env var interpolation)
    command:
      - "--certificatesresolvers.cloudflare.acme.email=${ADMIN_EMAIL}"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    extra_hosts:
      # Allows Traefik to reach Pi-hole (network_mode: host) via host.docker.internal
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/letsencrypt/acme.json:/acme.json
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # Dashboard route — also triggers the wildcard cert request for *.woggles.work
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.woggles.work`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=cloudflare"
      - "traefik.http.routers.traefik-dashboard.tls.domains[0].main=woggles.work"
      - "traefik.http.routers.traefik-dashboard.tls.domains[0].sans=*.woggles.work"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_USERS}"

  dockerproxy:
    container_name: dockerproxy
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    environment:
      - CONTAINERS=1
      - SERVICES=1
      - TASKS=1
      - POST=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    restart: unless-stopped

  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    hostname: homepage
    user: "1000:1000"
    volumes:
      - ./homepage/config:/app/config
    environment:
      - TZ=${TZ:-America/New_York}
      - HOMEPAGE_ALLOWED_HOSTS=homepage.woggles.work
      - HOMEPAGE_VAR_PIHOLE_API_KEY=${PIHOLE_API_KEY:-}
      - HOMEPAGE_VAR_JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - HOMEPAGE_VAR_PORTAINER_API_KEY=${PORTAINER_API_KEY:-}
      - HOMEPAGE_VAR_PORTAINER_ENV_ID=${PORTAINER_ENV_ID:-}
      - HOMEPAGE_VAR_TRAEFIK_USERNAME=${TRAEFIK_USERNAME:-}
      - HOMEPAGE_VAR_TRAEFIK_PASSWORD=${TRAEFIK_PASSWORD:-}
      - HOMEPAGE_VAR_CALIBREWEB_USERNAME=${CALIBREWEB_USERNAME:-}
      - HOMEPAGE_VAR_CALIBREWEB_PASSWORD=${CALIBREWEB_PASSWORD:-}
      - DOCKER_HOST=tcp://dockerproxy:2375
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.rule=Host(`homepage.woggles.work`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=cloudflare"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin
    user: "1000:1000"
    group_add:
      # Run: getent group render | cut -d: -f3 on the server to find the correct GID
      - "${RENDER_GID:-44}"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ${MEDIA_PATH:-/mnt/media}:/media:ro
    ports:
      - "8096:8096"
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.woggles.work`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.routers.jellyfin.tls.certresolver=cloudflare"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portainer.rule=Host(`portainer.woggles.work`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls.certresolver=cloudflare"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  filebrowser:
    container_name: filebrowser
    image: filebrowser/filebrowser:latest
    volumes:
      - ./filebrowser/database:/database
      - ./filebrowser/config:/config
      - ${FILEBROWSER_PATH:-/mnt/data}:/srv
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.filebrowser.rule=Host(`files.woggles.work`)"
      - "traefik.http.routers.filebrowser.entrypoints=websecure"
      - "traefik.http.routers.filebrowser.tls.certresolver=cloudflare"
      - "traefik.http.services.filebrowser.loadbalancer.server.port=80"

  syncthing:
    container_name: syncthing
    image: lscr.io/linuxserver/syncthing:latest
    hostname: syncthing
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./syncthing/config:/config
      - ${SYNC_PATH:-/mnt/sync}:/data1
    ports:
      - "22000:22000/tcp"
      - "22000:22000/udp"
      - "21027:21027/udp"
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.syncthing.rule=Host(`syncthing.woggles.work`)"
      - "traefik.http.routers.syncthing.entrypoints=websecure"
      - "traefik.http.routers.syncthing.tls.certresolver=cloudflare"
      - "traefik.http.services.syncthing.loadbalancer.server.port=8384"

  wallabag:
    container_name: wallabag
    image: wallabag/wallabag:2.6.14
    # To upgrade: bump image tag, then run:
    #   docker exec wallabag php bin/console doctrine:migrations:migrate --env=prod
    environment:
      - SYMFONY__ENV__DOMAIN_NAME=https://wallabag.woggles.work
      - SYMFONY__ENV__SECRET=${WALLABAG_SECRET:-}
      - SYMFONY__ENV__DATABASE_DRIVER=pdo_sqlite
      - SYMFONY__ENV__FOSUSER_REGISTRATION=false
      - POPULATE_DATABASE=True
    volumes:
      - ./wallabag/data:/var/www/wallabag/data
      - wallabag_images:/var/www/wallabag/web/assets/images
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wallabag.rule=Host(`wallabag.woggles.work`)"
      - "traefik.http.routers.wallabag.entrypoints=websecure"
      - "traefik.http.routers.wallabag.tls.certresolver=cloudflare"
      - "traefik.http.services.wallabag.loadbalancer.server.port=80"

  kosync:
    container_name: kosync
    image: ghcr.io/nperez0111/koreader-sync:latest
    environment:
      - TZ=${TZ:-America/New_York}
      - PASSWORD_SALT=${KOSYNC_PASSWORD_SALT}
    volumes:
      - kosync-data:/app/data
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kosync.rule=Host(`kosync.woggles.work`)"
      - "traefik.http.routers.kosync.entrypoints=websecure"
      - "traefik.http.routers.kosync.tls.certresolver=cloudflare"
      - "traefik.http.services.kosync.loadbalancer.server.port=3000"

  calibre-web:
    container_name: calibre-web
    image: lscr.io/linuxserver/calibre-web:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-America/New_York}
    volumes:
      - ./calibre-web/config:/config
      - ${SYNC_PATH:-/mnt/sync}:/sync:ro
    networks:
      - proxy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calibre-web.rule=Host(`calibre-web.woggles.work`)"
      - "traefik.http.routers.calibre-web.entrypoints=websecure"
      - "traefik.http.routers.calibre-web.tls.certresolver=cloudflare"
      - "traefik.http.services.calibre-web.loadbalancer.server.port=8083"

volumes:
  wallabag_images:
  kosync-data:
