---
# For configuration options and examples, please see:
# https://gethomepage.dev/configs/services/

- Network:
    - Pi-hole:
        href: https://pihole.woggles.work/admin
        description: Network-wide DNS and ad-blocking
        icon: pi-hole
        widget:
          type: pihole
          url: http://192.168.0.243:8080
          key: "{{HOMEPAGE_VAR_PIHOLE_API_KEY}}"
          version: 6
    - Traefik:
        href: https://traefik.woggles.work
        description: Reverse proxy and SSL termination
        icon: traefik
        widget:
          type: traefik
          url: https://traefik.woggles.work
          username: "{{HOMEPAGE_VAR_TRAEFIK_USERNAME}}"
          password: "{{HOMEPAGE_VAR_TRAEFIK_PASSWORD}}"

- Infrastructure:
    - Tailscale:
        href: https://login.tailscale.com/admin
        description: VPN and remote access
        icon: tailscale
    - Portainer:
        href: https://portainer.woggles.work
        description: Docker container management
        icon: portainer
        widget:
          type: portainer
          url: http://portainer:9000
          env: "{{HOMEPAGE_VAR_PORTAINER_ENV_ID}}"
          key: "{{HOMEPAGE_VAR_PORTAINER_API_KEY}}"

- Media:
    - Jellyfin:
        href: https://jellyfin.woggles.work
        description: Media server
        icon: jellyfin
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableBlocks: true

- Files:
    - Syncthing:
        href: https://syncthing.woggles.work
        description: File synchronization
        icon: syncthing
        widget:
          type: syncthing
          url: http://syncthing:8384
    - FileBrowser:
        href: https://files.woggles.work
        description: Drag-and-drop file transfer
        icon: filebrowser

- Reading:
    - Wallabag:
        href: https://wallabag.woggles.work
        description: Read-it-later
        icon: wallabag
    - KOReader Sync:
        href: https://kosync.woggles.work
        description: Reading progress sync (no UI)
